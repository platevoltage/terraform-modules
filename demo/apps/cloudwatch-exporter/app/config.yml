# cloudwatch_exporter.yml
region: us-east-1
use_get_metric_data: true
period_seconds: 300
range_seconds: 3600
delay_seconds: 120
set_timestamp: true
metrics_per_query: 500
port: 9106
metrics:
  - aws_dimensions:
    - ClusterName
    - ServiceName
    aws_metric_name: CPUUtilization
    aws_namespace: AWS/ECS
    aws_statistics:
    - Average
  - aws_dimensions:
    - ClusterName
    - ServiceName
    aws_metric_name: MemoryUtilization
    aws_namespace: AWS/ECS
    aws_statistics:
    - Average
  - aws_dimensions:
    - ClusterName
    aws_metric_name: GPUReservation
    aws_namespace: AWS/ECS
    aws_statistics:
    - Average
  - aws_dimensions:
    - ClusterName
    aws_metric_name: CPUReservation
    aws_namespace: AWS/ECS
    aws_statistics:
    - Average
  - aws_dimensions:
    - ClusterName
    aws_metric_name: MemoryReservation
    aws_namespace: AWS/ECS
    aws_statistics:
    - Average